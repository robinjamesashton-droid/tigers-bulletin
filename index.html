  :root{
    --ink:#121014;
    --paper:#F6F1E7;
    --amber:#F2A900;
    --amber-dim:#C98600;
    --stripe-dark:#1c1a1f;
    --meta:#8b8578;
    --line:#ded5c0;
    --card:#fffdf8;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Source Serif 4', Georgia, serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .stripes{
    height:14px;
    width:100%;
    background:repeating-linear-gradient(
      -45deg,
      var(--stripe-dark),
      var(--stripe-dark) 12px,
      var(--amber) 12px,
      var(--amber) 24px
    );
  }

  header{
    max-width:760px;
    margin:0 auto;
    padding:40px 24px 20px;
  }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--amber-dim);
    margin:0 0 10px;
  }

  h1{
    font-family:'Archivo Black', sans-serif;
    font-size:clamp(32px, 9vw, 60px);
    line-height:0.95;
    margin:0 0 6px;
    letter-spacing:-0.01em;
    overflow-wrap:break-word;
    word-break:break-word;
  }
  h1 span{ color: var(--amber-dim); display:block; }

  .sub{
    font-size:16px;
    color:#4a453d;
    max-width:52ch;
    margin:0;
  }

  .controls{
    max-width:760px;
    margin:0 auto;
    padding:8px 24px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
    border-bottom:1px solid var(--line);
  }

    font-size:12px;
    color:var(--meta);
